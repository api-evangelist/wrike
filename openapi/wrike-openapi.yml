openapi: 3.0.3
info:
  title: Wrike API
  description: >-
    The Wrike REST API v4 enables developers to build integrations and
    automations for Wrike, a collaborative work management platform used by
    20,000+ organizations. The API provides access to tasks, folders, projects,
    contacts, workflows, time tracking, webhooks, and more. Authentication uses
    OAuth 2.0 or permanent access tokens. Additional platforms include a DataHub
    Public API for analytics, BI Export, Cloud Content Connector, and an MCP
    Server for AI assistant integration.
  version: '4.0'
  termsOfService: https://www.wrike.com/developer-terms/
  contact:
    name: Wrike Developer Support
    url: https://developers.wrike.com
  license:
    name: Wrike API Terms
    url: https://www.wrike.com/developer-terms/
externalDocs:
  description: Wrike Developer Documentation
  url: https://developers.wrike.com

servers:
  - url: https://www.wrike.com/api/v4
    description: Wrike REST API v4

security:
  - oauth2: []
  - bearerToken: []

tags:
  - name: Contacts
    description: Users and user groups in Wrike accounts
  - name: Users
    description: User management and profile operations
  - name: Groups
    description: User group management
  - name: Invitations
    description: User invitation management
  - name: Accounts
    description: Account settings and configuration
  - name: Workflows
    description: Workflow and status management
  - name: Custom Fields
    description: Custom field definitions and management
  - name: Folders And Projects
    description: Folder and project hierarchy management
  - name: Tasks
    description: Task creation, retrieval, updates, and deletion
  - name: Comments
    description: Task and folder comment management
  - name: Dependencies
    description: Task dependency management
  - name: Time Logs
    description: Time tracking and timelog records
  - name: Attachments
    description: File attachment management
  - name: Webhooks
    description: Event-driven webhook subscriptions
  - name: Access Roles
    description: Access role and permission management
  - name: Colors
    description: Available color palette

paths:
  /contacts:
    get:
      operationId: listContacts
      summary: List Contacts
      description: >-
        Returns a list of contacts of all users and user groups in all
        accessible accounts.
      tags:
        - Contacts
      parameters:
        - name: me
          in: query
          description: If present, only contact info of the requesting user is returned
          required: false
          schema:
            type: boolean
        - name: metadata
          in: query
          description: Metadata filter, exact match for metadata key or key-value pair
          required: false
          schema:
            type: string
        - name: fields
          in: query
          description: JSON string array of optional fields to include in the response
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /contacts/{contactId}:
    get:
      operationId: getContact
      summary: Get Contact
      description: Returns contact information for specified users and user groups.
      tags:
        - Contacts
      parameters:
        - name: contactId
          in: path
          required: true
          description: Comma-separated list of contact IDs (up to 100)
          schema:
            type: string
        - name: fields
          in: query
          description: JSON string array of optional fields to include in the response
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Contact details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateContact
      summary: Update Contact
      description: >-
        Updates contact information. Only the contact whose API token is being
        used may be updated.
      tags:
        - Contacts
      parameters:
        - name: contactId
          in: path
          required: true
          description: The contact ID
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                metadata:
                  type: string
                  description: Metadata key-value pairs to update
      responses:
        '200':
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}:
    get:
      operationId: getUser
      summary: Get User
      description: Returns information about a specific user.
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: The user ID
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateUser
      summary: Update User
      description: Updates user profile information.
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: The user ID
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [User, Collaborator]
                  description: User role in the account
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups:
    get:
      operationId: listGroups
      summary: List Groups
      description: Returns a list of all user groups in all accessible accounts.
      tags:
        - Groups
      parameters:
        - name: metadata
          in: query
          description: Metadata filter
          required: false
          schema:
            type: string
        - name: fields
          in: query
          description: JSON string array of optional fields
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createGroup
      summary: Create Group
      description: Creates a new user group in the account.
      tags:
        - Groups
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  description: Group title
                memberIds:
                  type: string
                  description: Comma-separated list of member user IDs
                metadata:
                  type: string
                  description: Metadata key-value pairs
      responses:
        '200':
          description: Created group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups/{groupId}:
    get:
      operationId: getGroup
      summary: Get Group
      description: Returns information about a specific user group.
      tags:
        - Groups
      parameters:
        - name: groupId
          in: path
          required: true
          description: The group ID
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Group details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateGroup
      summary: Update Group
      description: Updates a user group.
      tags:
        - Groups
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                title:
                  type: string
                addMemberIds:
                  type: string
                removeMemberIds:
                  type: string
                metadata:
                  type: string
      responses:
        '200':
          description: Updated group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteGroup
      summary: Delete Group
      description: Deletes a user group.
      tags:
        - Groups
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts:
    get:
      operationId: listAccounts
      summary: List Accounts
      description: Returns all accounts accessible to the current user.
      tags:
        - Accounts
      parameters:
        - name: metadata
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts/{accountId}:
    put:
      operationId: updateAccount
      summary: Update Account
      description: Updates account settings.
      tags:
        - Accounts
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                metadata:
                  type: string
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts/{accountId}/workflows:
    get:
      operationId: listWorkflows
      summary: List Workflows
      description: >-
        Returns all workflows in the specified account. Workflows define the
        status stages for tasks within the account.
      tags:
        - Workflows
      parameters:
        - name: accountId
          in: path
          required: true
          description: The account ID
          schema:
            type: string
      responses:
        '200':
          description: List of workflows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createWorkflow
      summary: Create Workflow
      description: Creates a new workflow in the account.
      tags:
        - Workflows
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Workflow name
      responses:
        '200':
          description: Created workflow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts/{accountId}/workflows/{workflowId}:
    put:
      operationId: updateWorkflow
      summary: Update Workflow
      description: Updates an existing workflow.
      tags:
        - Workflows
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                hidden:
                  type: boolean
      responses:
        '200':
          description: Updated workflow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accounts/{accountId}/customfields:
    get:
      operationId: listCustomFields
      summary: List Custom Fields
      description: Returns all custom field definitions in the account.
      tags:
        - Custom Fields
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of custom fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomFieldListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createCustomField
      summary: Create Custom Field
      description: Creates a new custom field definition in the account.
      tags:
        - Custom Fields
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - title
                - type
              properties:
                title:
                  type: string
                type:
                  type: string
                  enum: [Text, DropDown, Numeric, Currency, Percentage, Date, Duration, Checkbox, Bulk]
                shareds:
                  type: string
                  description: Comma-separated list of shared user/group IDs
      responses:
        '200':
          description: Created custom field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomFieldListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /folders:
    get:
      operationId: listFolders
      summary: List Folders
      description: >-
        Returns list of entries required to build a folder tree for all
        accessible accounts.
      tags:
        - Folders And Projects
      parameters:
        - name: permalink
          in: query
          description: Folder permalink, exact match
          required: false
          schema:
            type: string
        - name: descendants
          in: query
          description: Adds all descendant folders to search scope
          required: false
          schema:
            type: boolean
        - name: metadata
          in: query
          required: false
          schema:
            type: string
        - name: customField
          in: query
          description: Custom field filter (id/value) as JSON object
          required: false
          schema:
            type: string
        - name: updatedDate
          in: query
          description: Updated date filter range
          required: false
          schema:
            type: string
        - name: project
          in: query
          description: Get only projects (true) or only folders (false)
          required: false
          schema:
            type: boolean
        - name: deleted
          in: query
          description: Get folders from Root (false) or Recycle Bin (true)
          required: false
          schema:
            type: boolean
        - name: fields
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of folders and projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /folders/{folderId}:
    get:
      operationId: getFolder
      summary: Get Folder
      description: Returns information about a specific folder or project.
      tags:
        - Folders And Projects
      parameters:
        - name: folderId
          in: path
          required: true
          description: The folder ID
          schema:
            type: string
      responses:
        '200':
          description: Folder details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateFolder
      summary: Update Folder
      description: Updates a folder or project.
      tags:
        - Folders And Projects
      parameters:
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                shareds:
                  type: string
                addShareds:
                  type: string
                removeShareds:
                  type: string
                metadata:
                  type: string
                customFields:
                  type: string
      responses:
        '200':
          description: Updated folder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteFolder
      summary: Delete Folder
      description: Deletes a folder or project, moving it to the Recycle Bin.
      tags:
        - Folders And Projects
      parameters:
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /folders/{folderId}/folders:
    get:
      operationId: listFolderSubfolders
      summary: List Folder Subfolders
      description: Returns folder tree entries for the subtree of this folder.
      tags:
        - Folders And Projects
      parameters:
        - name: folderId
          in: path
          required: true
          schema:
            type: string
        - name: descendants
          in: query
          required: false
          schema:
            type: boolean
        - name: metadata
          in: query
          required: false
          schema:
            type: string
        - name: project
          in: query
          required: false
          schema:
            type: boolean
        - name: fields
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of subfolders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createFolderInFolder
      summary: Create Folder In Folder
      description: Creates a new folder inside the specified parent folder.
      tags:
        - Folders And Projects
      parameters:
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                description:
                  type: string
                shareds:
                  type: string
                metadata:
                  type: string
                customFields:
                  type: string
                project:
                  type: string
                  description: JSON object with project settings
      responses:
        '200':
          description: Created folder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks:
    get:
      operationId: listTasks
      summary: List Tasks
      description: Searches among all tasks in all accessible accounts.
      tags:
        - Tasks
      parameters:
        - name: title
          in: query
          description: Title filter, exact match
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: Status filter
          required: false
          schema:
            type: string
            enum: [Active, Completed, Deferred, Cancelled]
        - name: importance
          in: query
          required: false
          schema:
            type: string
            enum: [High, Normal, Low]
        - name: startDate
          in: query
          description: Start date filter range (ISO 8601)
          required: false
          schema:
            type: string
        - name: dueDate
          in: query
          description: Due date filter range (ISO 8601)
          required: false
          schema:
            type: string
        - name: createdDate
          in: query
          required: false
          schema:
            type: string
        - name: updatedDate
          in: query
          required: false
          schema:
            type: string
        - name: completedDate
          in: query
          required: false
          schema:
            type: string
        - name: authors
          in: query
          description: Comma-separated author IDs
          required: false
          schema:
            type: string
        - name: responsibles
          in: query
          description: Comma-separated responsible user IDs
          required: false
          schema:
            type: string
        - name: permalink
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [Backlog, Milestone, Planned]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 1000
        - name: sortField
          in: query
          required: false
          schema:
            type: string
            enum: [CreatedDate, UpdatedDate, CompletedDate, DueDate, Status, Importance, Title]
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [Asc, Desc]
        - name: subTasks
          in: query
          required: false
          schema:
            type: boolean
        - name: metadata
          in: query
          required: false
          schema:
            type: string
        - name: customField
          in: query
          required: false
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
        - name: nextPageToken
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tasks/{taskId}:
    get:
      operationId: getTask
      summary: Get Task
      description: Returns complete information about one or more tasks.
      tags:
        - Tasks
      parameters:
        - name: taskId
          in: path
          required: true
          description: Comma-separated list of task IDs (up to 100)
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateTask
      summary: Update Task
      description: Updates a task's properties.
      tags:
        - Tasks
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [Active, Completed, Deferred, Cancelled]
                importance:
                  type: string
                  enum: [High, Normal, Low]
                dates:
                  type: string
                  description: JSON object with start/due dates
                responsibles:
                  type: string
                addResponsibles:
                  type: string
                removeResponsibles:
                  type: string
                metadata:
                  type: string
                customFields:
                  type: string
                customStatus:
                  type: string
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteTask
      summary: Delete Task
      description: Deletes a task, moving it to the Recycle Bin.
      tags:
        - Tasks
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /folders/{folderId}/tasks:
    get:
      operationId: listFolderTasks
      summary: List Folder Tasks
      description: Returns all tasks within the specified folder or project.
      tags:
        - Tasks
      parameters:
        - name: folderId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
