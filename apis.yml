aid: wrike
name: Wrike
description: Wrike is a collaborative work management platform used by 30,000+ organizations.
  The Wrike Developer Platform exposes a REST API v4 for building integrations and
  automations against tasks, folders, projects, contacts, workflows, time tracking,
  custom fields, audit logs, and webhooks. The platform also offers the DataHub Public
  API for raw analytical data, a BI Export API for piping data into Tableau, Power
  BI, or Looker, a Cloud Content Connector for managing cloud-based content assets,
  and a Wrike MCP Server for connecting Wrike to AI assistants such as Claude, ChatGPT,
  and Microsoft Copilot Studio. Authentication is handled via OAuth 2.0 or permanent
  access tokens.
