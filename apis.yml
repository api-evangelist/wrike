apis:
- aid: wrike:wrike
  name: Wrike API
  description: The Wrike REST API v4 enables developers to build integrations and
    automations for Wrike. The API provides programmatic access to tasks, folders,
    projects, contacts, workflows, time tracking, timesheets, custom fields, audit
    logs, webhooks, and more. Authentication uses OAuth 2.0 or permanent access tokens,
    and the base URL is https://www.wrike.com/api/v4.
