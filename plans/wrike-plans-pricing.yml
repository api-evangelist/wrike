specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Wrike
providerId: wrike
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Work Management
  - Project Management
  - Collaboration
  - Productivity
  - Task Management
description: Wrike sells five seat-based subscription tiers (Free, Team, Business, Pinnacle, Apex)
  plus a set of paid add-ons (Whiteboard, Integrate, Two-Way Sync, Datahub, Lock, AI Elite Action
  Pack). API access is included with the underlying plan rather than priced separately. Pinnacle
  and Apex are quote-based; Team and Business have published per-user list prices.
sources:
  - https://www.wrike.com/price/
plans:
  - id: wrike-free
    name: Free
    type: freemium
    description: Free seat tier for evaluation and very small teams. Web, desktop, and mobile
      apps; basic project and task management with board and table views.
    entries:
      - label: Per user / month
        name: per_user_month
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: true
    elements:
      - name: Web, desktop, and mobile apps
      - name: Project and task management
      - name: Board view
      - name: Table view
  - id: wrike-team
    name: Team
    type: subscription
    description: Entry paid tier for small teams (2-15 users). Adds AI Essentials, shareable
      dashboards, and interactive Gantt charts.
    entries:
      - label: Per user / month
        name: per_user_month
        type: subscription
        metric: seat
        limit: 15
        timeFrame: month
        geo: global
        unit: 1
        price: $10/user/month
        userMultiplied: true
    elements:
      - name: All Free features
      - name: AI Essentials
      - name: Shareable dashboards
      - name: Interactive Gantt charts
      - name: 2-15 users
  - id: wrike-business
    name: Business
    type: subscription
    description: Mid-market tier (5-200 users). Adds AI Elite starter pack, workspace templates,
      and standard integrations.
    entries:
