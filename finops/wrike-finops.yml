meters:
  - name: seats
    unit: seat
    aggregation: max
    dimensions:
      - plan
      - account
  - name: addon_subscription
    unit: month
    aggregation: sum
    dimensions:
      - addon
      - account
  - name: ai_elite_actions
    unit: action
    aggregation: sum
    dimensions:
      - account
      - plan
principles:
  - name: Visibility
    description: Wrike spend is visible at the account level via the Wrike admin billing page and
      monthly invoices; API consumption is not separately metered, so usage telemetry comes from
      Wrike Analyze / Datahub rather than a billing export.
  - name: Allocation
    description: Allocate by Wrike account and plan tier; multi-team customers split cost by
      department via Wrike's account-group structure or by exporting seat-assignment reports.
  - name: Optimization
    description: Levers are seat right-sizing (Team vs. Business vs. Pinnacle), pruning inactive
      collaborators, and consolidating add-ons (Whiteboard / Integrate / Datahub) onto Apex when
      AI Elite usage is heavy.
  - name: Accountability
    description: PMO or Operations typically owns the Wrike subscription; integration teams own
      Wrike Integrate / Sync add-on consumption and AI Elite action budget.
