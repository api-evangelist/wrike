specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Wrike
providerId: wrike
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Work Management
  - Project Management
description: Wrike does not publish a numeric rate-limit policy for its v4 REST API on the public
  developers.wrike.com site. The developer portal references throttling and fair use but does not
  expose per-second or per-minute numbers in indexed pages. Limits are account-scoped and tuned by
  Wrike support / sales when integrations exceed steady-state usage.
sources:
  - https://developers.wrike.com/
responseCodes:
  throttled: 429
limits:
  - name: Account-scoped throttling (numbers not publicly documented)
    scope: account
    metric: varies
    limit: see https://developers.wrike.com/
    notes: Wrike enforces account-level throttling on the v4 REST API; specific request-rate
      ceilings are not published on the developer portal at the time of reconciliation.
policies:
  - name: Backoff
    description: Standard guidance is exponential backoff with jitter on HTTP 429 responses;
      Retry-After should be honored when returned.
  - name: Fair use
    description: Wrike's developer portal frames API access as a fair-use facility; sustained
      high-volume integrations should coordinate with Wrike support to confirm appropriate ceiling.
  - name: Bulk operations
    description: Use Wrike's bulk task / folder endpoints and webhooks rather than polling tight
      loops to stay within account-level capacity.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
