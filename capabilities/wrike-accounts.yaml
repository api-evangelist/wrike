naftiko: 1.0.0-alpha2
info:
  label: Wrike API — Accounts
  description: 'Wrike API — Accounts. 2 operations. Lead operation: List Accounts. Self-contained Naftiko capability covering
    one Wrike business surface.'
  tags:
  - Wrike
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WRIKE_API_KEY: WRIKE_API_KEY
capability:
  consumes:
  - type: http
    namespace: wrike-accounts
    baseUri: https://www.wrike.com/api/v4
    description: Wrike API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: accounts
      path: /accounts
      operations:
      - name: listaccounts
        method: GET
        description: List Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: metadata
          in: query
          type: string
        - name: fields
          in: query
          type: string
    - name: accounts-accountId
      path: /accounts/{accountId}
      operations:
      - name: updateaccount
        method: PUT
        description: Update Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WRIKE_API_KEY}}'
  exposes:
  - type: rest
    namespace: wrike-accounts-rest
    port: 8080
    description: REST adapter for Wrike API — Accounts. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/accounts
      name: accounts
      description: REST surface for accounts.
      operations:
      - method: GET
        name: listaccounts
        description: List Accounts
        call: wrike-accounts.listaccounts
        with:
          metadata: rest.metadata
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}
      name: accounts-accountid
      description: REST surface for accounts-accountId.
      operations:
      - method: PUT
        name: updateaccount
        description: Update Account
        call: wrike-accounts.updateaccount
        with:
          accountId: rest.accountId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wrike-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wrike API — Accounts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-accounts
      description: List Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wrike-accounts.listaccounts
      with:
        metadata: tools.metadata
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: update-account
      description: Update Account
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: wrike-accounts.updateaccount
      with:
        accountId: tools.accountId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
