naftiko: 1.0.0-alpha2
info:
  label: Wrike API — Workflows
  description: 'Wrike API — Workflows. 3 operations. Lead operation: List Workflows. Self-contained Naftiko capability covering
    one Wrike business surface.'
  tags:
  - Wrike
  - Workflows
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WRIKE_API_KEY: WRIKE_API_KEY
capability:
  consumes:
  - type: http
    namespace: wrike-workflows
    baseUri: https://www.wrike.com/api/v4
    description: Wrike API — Workflows business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-workflows
      path: /accounts/{accountId}/workflows
      operations:
      - name: listworkflows
        method: GET
        description: List Workflows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID
          required: true
      - name: createworkflow
        method: POST
        description: Create Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-accountId-workflows-workflowId
      path: /accounts/{accountId}/workflows/{workflowId}
      operations:
      - name: updateworkflow
        method: PUT
        description: Update Workflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: workflowId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WRIKE_API_KEY}}'
  exposes:
  - type: rest
    namespace: wrike-workflows-rest
    port: 8080
    description: REST adapter for Wrike API — Workflows. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/accounts/{accountid}/workflows
      name: accounts-accountid-workflows
      description: REST surface for accounts-accountId-workflows.
      operations:
      - method: GET
        name: listworkflows
        description: List Workflows
        call: wrike-workflows.listworkflows
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createworkflow
        description: Create Workflow
        call: wrike-workflows.createworkflow
        with:
          accountId: rest.accountId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}/workflows/{workflowid}
      name: accounts-accountid-workflows-workflowid
      description: REST surface for accounts-accountId-workflows-workflowId.
      operations:
      - method: PUT
        name: updateworkflow
        description: Update Workflow
        call: wrike-workflows.updateworkflow
        with:
          accountId: rest.accountId
          workflowId: rest.workflowId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wrike-workflows-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wrike API — Workflows. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-workflows
      description: List Workflows
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wrike-workflows.listworkflows
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-workflow
      description: Create Workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wrike-workflows.createworkflow
      with:
        accountId: tools.accountId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-workflow
      description: Update Workflow
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: wrike-workflows.updateworkflow
      with:
        accountId: tools.accountId
        workflowId: tools.workflowId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
