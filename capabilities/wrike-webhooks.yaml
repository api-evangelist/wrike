naftiko: 1.0.0-alpha2
info:
  label: Wrike API — Webhooks
  description: 'Wrike API — Webhooks. 4 operations. Lead operation: List Webhooks. Self-contained Naftiko capability covering
    one Wrike business surface.'
  tags:
  - Wrike
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WRIKE_API_KEY: WRIKE_API_KEY
capability:
  consumes:
  - type: http
    namespace: wrike-webhooks
    baseUri: https://www.wrike.com/api/v4
    description: Wrike API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-webhooks
      path: /accounts/{accountId}/webhooks
      operations:
      - name: listwebhooks
        method: GET
        description: List Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
      - name: createwebhook
        method: POST
        description: Create Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhooks-webhookId
      path: /webhooks/{webhookId}
      operations:
      - name: updatewebhook
        method: PUT
        description: Update Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhookId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletewebhook
        method: DELETE
        description: Delete Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: webhookId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.WRIKE_API_KEY}}'
  exposes:
  - type: rest
    namespace: wrike-webhooks-rest
    port: 8080
    description: REST adapter for Wrike API — Webhooks. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/accounts/{accountid}/webhooks
      name: accounts-accountid-webhooks
      description: REST surface for accounts-accountId-webhooks.
      operations:
      - method: GET
        name: listwebhooks
        description: List Webhooks
        call: wrike-webhooks.listwebhooks
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createwebhook
        description: Create Webhook
        call: wrike-webhooks.createwebhook
        with:
          accountId: rest.accountId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{webhookid}
      name: webhooks-webhookid
      description: REST surface for webhooks-webhookId.
      operations:
      - method: PUT
        name: updatewebhook
        description: Update Webhook
        call: wrike-webhooks.updatewebhook
        with:
          webhookId: rest.webhookId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletewebhook
        description: Delete Webhook
        call: wrike-webhooks.deletewebhook
        with:
          webhookId: rest.webhookId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wrike-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wrike API — Webhooks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-webhooks
      description: List Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wrike-webhooks.listwebhooks
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-webhook
      description: Create Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: wrike-webhooks.createwebhook
      with:
        accountId: tools.accountId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-webhook
      description: Update Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: wrike-webhooks.updatewebhook
      with:
        webhookId: tools.webhookId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete Webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: wrike-webhooks.deletewebhook
      with:
        webhookId: tools.webhookId
      outputParameters:
      - type: object
        mapping: $.
