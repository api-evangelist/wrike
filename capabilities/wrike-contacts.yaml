naftiko: 1.0.0-alpha2
info:
  label: Wrike API — Contacts
  description: 'Wrike API — Contacts. 3 operations. Lead operation: List Contacts. Self-contained Naftiko capability covering
    one Wrike business surface.'
  tags:
  - Wrike
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WRIKE_API_KEY: WRIKE_API_KEY
capability:
  consumes:
  - type: http
    namespace: wrike-contacts
    baseUri: https://www.wrike.com/api/v4
    description: Wrike API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: contacts
      path: /contacts
      operations:
      - name: listcontacts
        method: GET
        description: List Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: me
          in: query
          type: boolean
          description: If present, only contact info of the requesting user is returned
        - name: metadata
          in: query
          type: string
          description: Metadata filter, exact match for metadata key or key-value pair
        - name: fields
          in: query
          type: string
          description: JSON string array of optional fields to include in the response
    - name: contacts-contactId
      path: /contacts/{contactId}
      operations:
      - name: getcontact
        method: GET
        description: Get Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contactId
          in: path
          type: string
          description: Comma-separated list of contact IDs (up to 100)
          required: true
        - name: fields
          in: query
          type: string
          description: JSON string array of optional fields to include in the response
      - name: updatecontact
        method: PUT
        description: Update Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contactId
          in: path
          type: string
          description: The contact ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.WRIKE_API_KEY}}'
  exposes:
  - type: rest
    namespace: wrike-contacts-rest
    port: 8080
    description: REST adapter for Wrike API — Contacts. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/contacts
      name: contacts
      description: REST surface for contacts.
      operations:
      - method: GET
        name: listcontacts
        description: List Contacts
        call: wrike-contacts.listcontacts
        with:
          me: rest.me
          metadata: rest.metadata
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/contacts/{contactid}
      name: contacts-contactid
      description: REST surface for contacts-contactId.
      operations:
      - method: GET
        name: getcontact
        description: Get Contact
        call: wrike-contacts.getcontact
        with:
          contactId: rest.contactId
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecontact
        description: Update Contact
        call: wrike-contacts.updatecontact
        with:
          contactId: rest.contactId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wrike-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wrike API — Contacts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-contacts
      description: List Contacts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wrike-contacts.listcontacts
      with:
        me: tools.me
        metadata: tools.metadata
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: get-contact
      description: Get Contact
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wrike-contacts.getcontact
      with:
        contactId: tools.contactId
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: update-contact
      description: Update Contact
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: wrike-contacts.updatecontact
      with:
        contactId: tools.contactId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
