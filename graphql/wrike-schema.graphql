input CreateTaskInput {
  title: String!
  folderId: ID!
  description: String
  status: TaskStatus
  importance: TaskImportance
  responsibleIds: [ID!]
  dates: TaskDateInput
  customFields: [CustomFieldInput!]
  followerId: [ID!]
  superTaskIds: [ID!]
  metadata: [MetadataInput!]
}

input UpdateTaskInput {
  title: String
  description: String
  status: TaskStatus
  importance: TaskImportance
  responsibleIds: [ID!]
  dates: TaskDateInput
  customStatusId: ID
  customFields: [CustomFieldInput!]
  metadata: [MetadataInput!]
}

input TaskDateInput {
  type: String
  start: String
  due: String
  duration: Int
  workOnWeekends: Boolean
}

input CustomFieldInput {
  id: ID!
  value: String
}

input MetadataInput {
  key: String!
  value: String
}

input CreateFolderInput {
  title: String!
  parentId: ID!
  description: String
  sharingUserIds: [ID!]
  metadata: [MetadataInput!]
}

input UpdateFolderInput {
  title: String
  description: String
  metadata: [MetadataInput!]
}

input CreateProjectInput {
  title: String!
  parentId: ID!
  description: String
  ownerIds: [ID!]
  status: ProjectStatus
  startDate: String
  endDate: String
  workflowId: ID
}

input UpdateProjectInput {
  title: String
  description: String
  ownerIds: [ID!]
  status: ProjectStatus
  startDate: String
  endDate: String
  customStatusId: ID
}

input TimesheetEntryInput {
  taskId: ID!
  hours: Float!
  trackedDate: String!
  comment: String
  billingType: String
}

input UpdateTimesheetInput {
  hours: Float
  trackedDate: String
  comment: String
  billingType: String
}

input WebhookInput {
  hookUrl: String!
  events: [String!]
  scopeId: ID
  isPermanent: Boolean
  secretKey: String
}

input InvitationInput {
  email: String!
  firstName: String
  lastName: String
  role: UserRole!
}

input GroupInput {
  title: String!
  memberIds: [ID!]
}

input AutomationRuleInput {
  title: String!
  enabled: Boolean!
  trigger: RuleConditionInput!
  actions: [RuleActionInput!]!
  scopeId: ID
}

input RuleConditionInput {
  type: String!
  field: String
  operator: String
  value: String
}

input RuleActionInput {
  type: String!
  field: String
  value: String
  assigneeIds: [ID!]
  statusId: ID
}

# ─── Connection / Pagination ──────────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type TaskConnection {
  edges: [TaskEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

type TaskEdge {
  cursor: String!
  node: Task!
}

type FolderConnection {
  edges: [FolderEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

type FolderEdge {
  cursor: String!
  node: Folder!
}

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

type UserEdge {
  cursor: String!
  node: User!
}

# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  """Fetch the current Wrike account."""
  account: Account

  """List all users in the account."""
  users(first: Int, after: String): UserConnection

  """Fetch a single user by ID."""
  user(id: ID!): User

  """List contacts visible to the authenticated user."""
  contacts: [Contact!]

  """List groups in the account."""
  groups: [Group!]

  """Fetch a single group by ID."""
  group(id: ID!): GroupDetails

  """List spaces available to the authenticated user."""
  spaces: [Space!]

  """Fetch a single space by ID."""
  space(id: ID!): SpaceDetails

  """List folders, optionally scoped to a space or parent folder."""
  folders(spaceId: ID, parentId: ID, first: Int, after: String): FolderConnection

  """Fetch a single folder by ID."""
  folder(id: ID!): FolderDetails

  """Fetch a folder and its full descendant tree."""
  folderTree(id: ID!): FolderTree

  """List projects with optional status or space filter."""
  projects(spaceId: ID, status: ProjectStatus): [Project!]

  """Fetch a single project by ID."""
  project(id: ID!): Project

  """List tasks with optional filters."""
  tasks(
    folderId: ID
    status: TaskStatus
    importance: TaskImportance
    assigneeId: ID
    customStatusId: ID
    first: Int
    after: String
  ): TaskConnection

  """Fetch a single task by ID."""
  task(id: ID!): TaskDetails

  """List all workflows in the account."""
  workflows: [Workflow!]

  """Fetch a single workflow by ID."""
  workflow(id: ID!): Workflow

  """List comments on a task or folder."""
  comments(taskId: ID, folderId: ID): [Comment!]

  """List attachments on a task or folder."""
  attachments(taskId: ID, folderId: ID): [Attachment!]

  """Fetch a single attachment by ID."""
  attachment(id: ID!): Attachment

  """Query timesheet entries with optional filters."""
  timesheetEntries(
    userId: ID
    taskId: ID
    startDate: String
    endDate: String
  ): [TimesheetEntry!]

  """Fetch aggregated timesheet details for a user and date range."""
  timesheetDetails(userId: ID!, startDate: String!, endDate: String!): TimesheetDetails

  """List reports available in the account."""
  reports: [Report!]

  """List approvals for a task."""
  approvals(taskId: ID!): [Approval!]

  """List webhooks registered for the account."""
  webhooks: [Webhook!]

  """Fetch a single webhook by ID."""
  webhook(id: ID!): Webhook

  """List activity entries in a stream."""
  activities(streamId: ID, filter: StreamFilter): [Activity!]

  """List dependencies for a task."""
  dependencies(taskId: ID!): [Dependency!]

  """List automation rules in the account."""
  automationRules: [AutomationRule!]

  """Fetch a single automation rule by ID."""
  automationRule(id: ID!): AutomationRule

  """List pending invitations."""
  invitations: [Invitation!]

  """Fetch the project timeline including task timelines."""
  projectTimeline(projectId: ID!): ProjectTimeline

  """Fetch budget summary for a project."""
  budgetSummary(projectId: ID!): BudgetSummary

  """Fetch review versions for an attachment."""
  reviewVersions(attachmentId: ID!): [ReviewVersion!]
}

type Mutation {
  """Create a new task in a folder or project."""
  createTask(input: CreateTaskInput!): Task

  """Update an existing task."""
  updateTask(id: ID!, input: UpdateTaskInput!): Task

  """Delete a task by ID."""
  deleteTask(id: ID!): Boolean

  """Create a folder."""
  createFolder(input: CreateFolderInput!): Folder

  """Update a folder."""
  updateFolder(id: ID!, input: UpdateFolderInput!): Folder

  """Delete a folder by ID."""
  deleteFolder(id: ID!): Boolean

  """Create a project."""
  createProject(input: CreateProjectInput!): Project

  """Update a project."""
  updateProject(id: ID!, input: UpdateProjectInput!): Project

  """Delete a project by ID."""
  deleteProject(id: ID!): Boolean

  """Add a comment to a task or folder."""
  createComment(taskId: ID, folderId: ID, text: String!): Comment

  """Edit an existing comment."""
  updateComment(id: ID!, text: String!): Comment

  """Delete a comment by ID."""
  deleteComment(id: ID!): Boolean

  """Upload an attachment to a task or folder."""
  uploadAttachment(taskId: ID, folderId: ID, file: Upload!): Attachment

  """Delete an attachment by ID."""
  deleteAttachment(id: ID!): Boolean

  """Log time against a task."""
  logTime(input: TimesheetEntryInput!): TimesheetEntry

  """Update a time log entry."""
  updateTimesheetEntry(id: ID!, input: UpdateTimesheetInput!): TimesheetEntry

  """Delete a time log entry."""
  deleteTimesheetEntry(id: ID!): Boolean

  """Register a new webhook."""
  createWebhook(input: WebhookInput!): Webhook

  """Update a webhook."""
  updateWebhook(id: ID!, input: WebhookInput!): Webhook

  """Delete a webhook."""
  deleteWebhook(id: ID!): Boolean

  """Invite a user to the account."""
  inviteUser(input: InvitationInput!): Invitation

  """Create a user group."""
  createGroup(input: GroupInput!): Group

  """Update a user group."""
  updateGroup(id: ID!, input: GroupInput!): Group

  """Delete a user group."""
  deleteGroup(id: ID!): Boolean

  """Create an automation rule."""
  createAutomationRule(input: AutomationRuleInput!): AutomationRule

  """Update an automation rule."""
  updateAutomationRule(id: ID!, input: AutomationRuleInput!): AutomationRule

  """Delete an automation rule."""
  deleteAutomationRule(id: ID!): Boolean

  """Submit an approval decision on a task."""
  submitApproval(taskId: ID!, decision: ApprovalDecision!, comment: String): Approval
}

type Subscription {
  """Fires when a task is created, updated, or deleted within a folder."""
  taskUpdated(folderId: ID): Task

  """Fires when a comment is added to a task."""
  commentAdded(taskId: ID!): Comment

  """Fires when an attachment is uploaded to a task."""
  attachmentUploaded(taskId: ID!): Attachment

  """Fires when an approval decision changes on a task."""
  approvalUpdated(taskId: ID!): Approval

  """Proxies Wrike webhook events as GraphQL subscription payloads."""
  webhookEvent(accountId: ID!): JSON
}
